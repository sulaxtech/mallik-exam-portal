<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Mallik Engineering Online Exam
</title>

<script defer
src="https://cdn.jsdelivr.net/npm/face-api.js">
</script>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0f1a;
color:white;
}

.header{
background:#111827;
padding:20px;
text-align:center;
}

.logo{
width:140px;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

.card{
background:#111827;
padding:20px;
border-radius:12px;
margin-top:20px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
box-sizing:border-box;
}

button{
padding:12px 25px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
margin-top:20px;
cursor:pointer;
}

.question{
background:#1f2937;
padding:15px;
border-radius:10px;
margin-top:15px;
}

.timer{
position:fixed;
top:10px;
right:10px;
background:red;
padding:12px 20px;
border-radius:10px;
font-size:22px;
font-weight:bold;
z-index:999;
}

.hidden{
display:none;
}

video{
width:240px;
border-radius:12px;
border:2px solid white;
margin-top:20px;
}

.warning{
color:#ff8080;
margin-top:10px;
}

.footer{
text-align:center;
margin-top:30px;
color:#9ca3af;
}

</style>

</head>

<body>

<div class="header">

<img src="mallik-logo.jpg"
class="logo">

<h1>
Mallik Engineering (India) Pvt Ltd
</h1>

<h2>
Advanced Online Exam Portal
</h2>

</div>

<div class="timer hidden"
id="timer">
60:00
</div>

<div class="container">

<div class="card"
id="loginPage">

<h2>
Candidate Login
</h2>

<input type="text"
id="name"
placeholder="Candidate Name">

<input type="text"
id="mobile"
placeholder="Mobile Number">

<input type="email"
id="email"
placeholder="Email ID">

<div class="warning">
⚠ Webcam required.
Tab switching prohibited.
</div>

<button onclick="startExam()">
Start Exam
</button>

</div>


<div class="card hidden"
id="examPage">

<h2>
Online Examination
</h2>

<video id="webcam"
autoplay
muted
playsinline>
</video>

<canvas id="canvas"
width="320"
height="240"
style="display:none">
</canvas>

<div id="faceStatus"></div>

<div id="questions"></div>

<button onclick="submitExam()">
Submit Exam
</button>

</div>


<div class="card hidden"
id="thankPage">

<h1 style="
color:#22c55e;
text-align:center;
">
Thank You
</h1>

<h3 style="
text-align:center;
">
Your response has been recorded.
</h3>

</div>

<div class="footer">
Mallik Engineering Online Assessment Portal
</div>

</div>


<script>

const scriptURL =
"https://script.google.com/macros/s/AKfycbyhY5V4Civ8o4YWNC87naanMNNUPfFbsi-n8SGrwDBULTryUvWj6h9sV3hh7KzmrahpVw/exec";

let questions = [];

let submitted = false;

let examStarted = false;

let timer;

let timeLeft = 3600;

let warningCount = 0;

let capturedPhotos = [];


// =====================================
// START EXAM
// =====================================

async function startExam(){

const name =
document.getElementById("name")
.value.trim();

const mobile =
document.getElementById("mobile")
.value.trim();

const email =
document.getElementById("email")
.value.trim();

if(!name || !mobile || !email){

alert("Fill all details");

return;

}

await startWebcam();

await loadFaceModels();

const response =
await fetch(scriptURL);

const allQuestions =
await response.json();

questions =
allQuestions
.sort(() => Math.random() - 0.5)
.slice(0,50);

loadQuestions();

examStarted = true;

startTimer();

startAutoCapture();

startFaceMonitoring();

if(document.documentElement
.requestFullscreen){

document.documentElement
.requestFullscreen();

}

document.getElementById(
"loginPage"
).classList.add("hidden");

document.getElementById(
"examPage"
).classList.remove("hidden");

document.getElementById(
"timer"
).classList.remove("hidden");

}


// =====================================
// LOAD QUESTIONS
// =====================================

function loadQuestions(){

let html = "";

questions.forEach((q,index)=>{

html += `

<div class="question">

<h3>
${index+1}. ${q.q}
</h3>

`;

q.options.forEach((opt,i)=>{

const letter =
["A","B","C","D"][i];

html += `

<label>

<input
type="radio"
name="q${index}"
value="${letter}">

${letter}) ${opt}

</label>

<br><br>

`;

});

html += `</div>`;

});

document.getElementById(
"questions"
).innerHTML = html;

}


// =====================================
// TIMER
// =====================================

function startTimer(){

timer = setInterval(()=>{

if(timeLeft <= 0){

submitExam();

return;

}

let minutes =
Math.floor(timeLeft/60);

let seconds =
timeLeft % 60;

document.getElementById(
"timer"
).innerText =

`${String(minutes)
.padStart(2,'0')}:${String(seconds)
.padStart(2,'0')}`;

timeLeft--;

},1000);

}


// =====================================
// WEBCAM
// =====================================

async function startWebcam(){

const stream =

await navigator.mediaDevices
.getUserMedia({
video:true
});

const video =
document.getElementById(
"webcam"
);

video.srcObject = stream;

}


// =====================================
// AUTO PHOTO CAPTURE
// =====================================

function startAutoCapture(){

setInterval(()=>{

capturePhoto();

},30000);

}


function capturePhoto(){

const video =
document.getElementById(
"webcam"
);

const canvas =
document.getElementById(
"canvas"
);

const ctx =
canvas.getContext("2d");

ctx.drawImage(
video,
0,
0,
320,
240
);

const image =
canvas.toDataURL("image/png");

capturedPhotos.push(image);

}


// =====================================
// FACE API
// =====================================

async function loadFaceModels(){

await faceapi
.nets
.tinyFaceDetector
.loadFromUri(
'https://justadudewhohacks.github.io/face-api.js/models'
);

}


// =====================================
// FACE MONITORING
// =====================================

function startFaceMonitoring(){

setInterval(async()=>{

const video =
document.getElementById(
"webcam"
);

const detections =

await faceapi.detectAllFaces(

video,

new faceapi
.TinyFaceDetectorOptions()

);

if(detections.length == 0){

showWarning(
"No face detected"
);

}

if(detections.length > 1){

showWarning(
"Multiple persons detected"
);

}

},5000);

}


// =====================================
// WARNINGS
// =====================================

function showWarning(message){

warningCount++;

capturePhoto();

alert(message);

if(warningCount >= 3){

alert(
"Exam Auto Submitted"
);

submitExam();

}

}


// =====================================
// TAB SWITCH
// =====================================

document.addEventListener(
'visibilitychange',
function(){

if(document.hidden &&
examStarted){

showWarning(
"Tab switch detected"
);

}

});


// =====================================
// SUBMIT EXAM
// =====================================

async function submitExam(){

if(submitted) return;

submitted = true;

clearInterval(timer);

let score = 0;

questions.forEach((q,index)=>{

let selected =

document.querySelector(
`input[name="q${index}"]:checked`
);

if(selected &&
selected.value === q.answer){

score++;

}

});

let correct = score;

let wrong =
questions.length-score;

let percentage =
(score/questions.length)*100;

let result =
percentage >= 60
? "PASS"
: "FAIL";


const data = {

name:
document.getElementById(
"name"
).value,

mobile:
document.getElementById(
"mobile"
).value,

email:
document.getElementById(
"email"
).value,

score:score,

correct:correct,

wrong:wrong,

result:result,

timeTaken:
(3600-timeLeft),

photos:capturedPhotos

};


await fetch(scriptURL,{

method:"POST",

mode:"no-cors",

headers:{
"Content-Type":
"application/json"
},

body:JSON.stringify(data)

});


document.getElementById(
"examPage"
).classList.add("hidden");

document.getElementById(
"timer"
).classList.add("hidden");

document.getElementById(
"thankPage"
).classList.remove("hidden");

}


// =====================================
// DISABLE RIGHT CLICK
// =====================================

document.addEventListener(
'contextmenu',
(event)=>event.preventDefault()
);

</script>

</body>
</html>

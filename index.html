<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mallik Engineering Online Exam</title>

<script defer src="https://cdn.jsdelivr.net/npm/face-api.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0f1a;
color:white;
}

.header{
background:#111827;
text-align:center;
padding:20px;
}

.logo{width:130px}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:#111827;
padding:20px;
border-radius:12px;
margin-top:20px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:none;
}

button{
width:100%;
padding:12px;
margin-top:15px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

.question{
background:#1f2937;
padding:15px;
margin-top:10px;
border-radius:10px;
}

.timer{
position:fixed;
top:10px;
right:10px;
background:red;
padding:10px 15px;
border-radius:8px;
font-weight:bold;
}

.hidden{display:none}

video{
width:220px;
border-radius:10px;
margin-top:10px;
background:black;
}

.rules{
background:#1f2937;
padding:10px;
border-radius:10px;
font-size:14px;
margin-top:10px;
line-height:1.5;
}

</style>

</head>

<body>

<div class="header">
<img src="mallik-logo.jpg" class="logo">
<h2>Mallik Engineering (India) Pvt Ltd</h2>
<h4>Online Examination System</h4>
</div>

<div class="timer hidden" id="timer">60:00</div>

<div class="container">

<!-- LOGIN -->
<div class="card" id="loginPage">

<h2>Candidate Login</h2>

<input id="name" placeholder="Name">
<input id="mobile" placeholder="Mobile">
<input id="email" placeholder="Email">

<div class="rules">
<b>Exam Rules:</b><br>
✔ No tab switching<br>
✔ Webcam must be ON<br>
✔ No copy/paste<br>
✔ Multiple face = warning<br>
✔ No looking away repeatedly<br>
</div>

<label style="display:block;margin-top:10px;">
<input type="checkbox" id="agree">
I accept all exam rules
</label>

<button onclick="startExam()">Start Exam</button>

</div>

<!-- EXAM -->
<div class="card hidden" id="examPage">

<h2>Online Exam</h2>

<video id="webcam" autoplay muted playsinline></video>

<div id="questions"></div>

<button onclick="submitExam()">Submit Exam</button>

</div>

</div>

<script>

const scriptURL =
"https://script.google.com/macros/s/AKfycbyhY5V4Civ8o4YWNC87naanMNNUPfFbsi-n8SGrwDBULTryUvWj6h9sV3hh7KzmrahpVw/exec";

let questions = [];
let photos = [];
let timeLeft = 3600;
let timer;
let examStarted = false;

let warningCount = 0;
let facePaused = false;
let multiFaceUsed = false;
let gazeWarnings = 0;
let examPaused = false;

// ================= START =================
async function startExam(){

if(!document.getElementById("agree").checked){
alert("Accept exam rules first");
return;
}

document.getElementById("loginPage").classList.add("hidden");
document.getElementById("examPage").classList.remove("hidden");
document.getElementById("timer").classList.remove("hidden");

startCamera();

const res = await fetch(scriptURL);
questions = await res.json();
loadQuestions();

startTimer();
startAutoCapture();
startFace();
startGaze();

examStarted = true;
}

// ================= CAMERA =================
async function startCamera(){
const stream = await navigator.mediaDevices.getUserMedia({video:true});
document.getElementById("webcam").srcObject = stream;
}

// ================= QUESTIONS =================
function loadQuestions(){

let html = "";

questions.forEach((q,i)=>{

html += `<div class="question">
<h3>${i+1}. ${q.q}</h3>`;

q.options.forEach((o,j)=>{
const l=["A","B","C","D"][j];
html += `<label><input type="radio" name="q${i}" value="${l}"> ${l}) ${o}</label><br>`;
});

html += `</div>`;
});

document.getElementById("questions").innerHTML = html;
}

// ================= TIMER =================
function startTimer(){
timer=setInterval(()=>{
let m=Math.floor(timeLeft/60);
let s=timeLeft%60;
document.getElementById("timer").innerText=`${m}:${s}`;
timeLeft--;
if(timeLeft<=0) submitExam();
},1000);
}

// ================= PHOTO =================
function capture(){
let v=document.getElementById("webcam");
let c=document.createElement("canvas");
c.width=320;c.height=240;
c.getContext("2d").drawImage(v,0,0);
photos.push(c.toDataURL("image/png"));
}

// ================= FACE AI =================
function startFace(){

setInterval(async()=>{

if(examPaused) return;

const v=document.getElementById("webcam");

const d=await faceapi.detectAllFaces(v,new faceapi.TinyFaceDetectorOptions());

// NO FACE
if(d.length===0){
pause("❌ No face detected");
}

// MULTIPLE FACE
if(d.length>1 && !multiFaceUsed){
multiFaceUsed=true;
pause("⚠ Multiple face detected (one-time warning)");
setTimeout(resume,10000);
}

},4000);
}

// ================= GAZE =================
function startGaze(){

setInterval(async()=>{

if(examPaused) return;

const v=document.getElementById("webcam");

const d=await faceapi.detectAllFaces(v,new faceapi.TinyFaceDetectorOptions());

if(d.length===1){

let b=d[0].box;

if(b.width<120){
gazeWarnings++;
capture();
alert("👀 Looking away detected");

if(gazeWarnings>=3){
pause("❌ Gaze violation limit reached");
}
}

}

},5000);
}

// ================= PAUSE =================
function pause(msg){
examPaused=true;
clearInterval(timer);
capture();
alert(msg);
}

// ================= RESUME =================
function resume(){
examPaused=false;
startTimer();
}

// ================= TAB SWITCH =================
document.addEventListener("visibilitychange",()=>{
if(document.hidden && examStarted){
capture();
alert("📵 Tab switch detected");
pause("Exam paused");
}
});

// ================= SUBMIT =================
async function submitExam(){

clearInterval(timer);
capture();

let score=0;

questions.forEach((q,i)=>{
let s=document.querySelector(`input[name="q${i}"]:checked`);
if(s && s.value===q.answer) score++;
});

let data={
name:document.getElementById("name").value,
mobile:document.getElementById("mobile").value,
email:document.getElementById("email").value,
score,
correct:score,
wrong:questions.length-score,
result:score>=50?"PASS":"FAIL",
timeTaken:3600-timeLeft,
photos
};

await fetch(scriptURL,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
});

alert("Exam Submitted");
}

</script>

</body>
</html>

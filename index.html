<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mallik Engineering Exam Portal</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#0b0f1a;
color:white;
}

.header{
background:#111827;
text-align:center;
padding:20px;
}

.logo{
width:120px;
margin-bottom:10px;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:#111827;
padding:20px;
border-radius:12px;
margin-top:20px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
box-sizing:border-box;
font-size:15px;
}

button{
width:100%;
padding:12px;
margin-top:15px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

.question{
background:#1f2937;
padding:15px;
border-radius:10px;
margin-top:15px;
}

.timer{
position:fixed;
top:10px;
right:10px;
background:red;
padding:10px 15px;
border-radius:8px;
font-weight:bold;
z-index:999;
}

.hidden{
display:none;
}

video{
width:240px;
height:180px;
border-radius:10px;
margin-top:10px;
background:black;
object-fit:cover;
}

.rules{
background:#1f2937;
padding:12px;
border-radius:10px;
font-size:14px;
margin-top:10px;
line-height:1.7;
}

label{
display:block;
margin-top:10px;
}

</style>

</head>

<body>

<!-- HEADER -->
<div class="header">

<img src="mallik-logo.jpg" class="logo">

<h2>Mallik Engineering (India) Pvt Ltd</h2>

<h4>Online Examination System</h4>

</div>

<!-- TIMER -->
<div class="timer hidden" id="timer">
60:00
</div>

<div class="container">

<!-- LOGIN PAGE -->
<div class="card" id="loginPage">

<h2>Candidate Login</h2>

<input type="text" id="name" placeholder="Enter Name">

<input type="text" id="mobile" placeholder="Enter Mobile Number">

<input type="email" id="email" placeholder="Enter Email Address">

<div class="rules">

<b>Exam Rules:</b><br><br>

✔ Webcam must remain ON<br>
✔ No tab switching allowed<br>
✔ Auto photo capture enabled<br>
✔ Exam auto submits when timer ends<br>

</div>

<label>

<input type="checkbox" id="agree">

I accept all exam rules

</label>

<button id="startBtn">

Start Exam

</button>

</div>

<!-- EXAM PAGE -->
<div class="card hidden" id="examPage">

<h2>Online Exam</h2>

<video id="webcam" autoplay muted playsinline></video>

<div id="questions"></div>

<button id="submitBtn">

Submit Exam

</button>

</div>

</div>

<script>

// ================= APPS SCRIPT URL =================
const scriptURL =
"https://script.google.com/macros/s/AKfycbyhY5V4Civ8o4YWNC87naanMNNUPfFbsi-n8SGrwDBULTryUvWj6h9sV3hh7KzmrahpVw/exec";

// ================= VARIABLES =================
let questions = [];

let photos = [];

let timeLeft = 3600;

let timer;

let examStarted = false;

// ================= START CAMERA =================
async function startCamera(){

try{

const video =
document.getElementById("webcam");

const stream =
await navigator.mediaDevices.getUserMedia({

video:true,
audio:false

});

video.srcObject = stream;

await video.play();

return true;

}catch(err){

console.log(err);

alert("Please allow camera permission");

return false;

}

}

// ================= START EXAM =================
async function startExam(){

try{

const nameInput =
document.getElementById("name");

const mobileInput =
document.getElementById("mobile");

const emailInput =
document.getElementById("email");

// NAME CHECK
if(nameInput.value.trim() === ""){

alert("Please enter name");

return;

}

// MOBILE CHECK
if(mobileInput.value.trim().length < 10){

alert("Enter valid mobile number");

return;

}

// EMAIL CHECK
if(!emailInput.value.includes("@")){

alert("Enter valid email");

return;

}

// RULES CHECK
if(!document.getElementById("agree").checked){

alert("Please accept exam rules");

return;

}

// CAMERA START
const camStarted =
await startCamera();

if(!camStarted){

return;

}

// HIDE LOGIN
document
.getElementById("loginPage")
.classList.add("hidden");

// SHOW EXAM
document
.getElementById("examPage")
.classList.remove("hidden");

// SHOW TIMER
document
.getElementById("timer")
.classList.remove("hidden");

// LOAD QUESTIONS
const res =
await fetch(scriptURL);

questions =
await res.json();

if(!Array.isArray(questions)){

alert("Questions not loaded");

return;

}

// SHOW QUESTIONS
loadQuestions();

examStarted = true;

// START TIMER
startTimer();

// START AUTO PHOTO
startMonitoring();

}catch(err){

console.log(err);

alert(
"Start Exam Error : " +
err.message
);

}

}

// ================= LOAD QUESTIONS =================
function loadQuestions(){

let html = "";

questions.forEach((q,i)=>{

html += `

<div class="question">

<h3>${i+1}. ${q.q}</h3>

`;

q.options.forEach((o,j)=>{

const option =
["A","B","C","D"][j];

html += `

<label>

<input
type="radio"
name="q${i}"
value="${option}"
>

${option}) ${o}

</label>

`;

});

html += `</div>`;

});

document
.getElementById("questions")
.innerHTML = html;

}

// ================= TIMER =================
function startTimer(){

timer = setInterval(()=>{

let m =
Math.floor(timeLeft / 60);

let s =
timeLeft % 60;

document
.getElementById("timer")
.innerText =

`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;

timeLeft--;

if(timeLeft <= 0){

submitExam();

}

},1000);

}

// ================= PHOTO CAPTURE =================
function capture(){

try{

const video =
document.getElementById("webcam");

if(!video.videoWidth){

return;

}

const canvas =
document.createElement("canvas");

canvas.width = 320;

canvas.height = 240;

canvas
.getContext("2d")
.drawImage(video,0,0);

photos.push(

canvas.toDataURL(
"image/jpeg",
0.5
)

);

}catch(err){

console.log(err);

}

}

// ================= AUTO CAPTURE =================
function startMonitoring(){

setInterval(()=>{

if(examStarted){

capture();

}

},30000);

}

// ================= TAB SWITCH =================
document.addEventListener(
"visibilitychange",
()=>{

if(document.hidden && examStarted){

alert("Tab switching detected");

capture();

}

}
);

// ================= SUBMIT EXAM =================
async function submitExam(){

try{

clearInterval(timer);

// FINAL PHOTO
capture();

let score = 0;

// CALCULATE SCORE
questions.forEach((q,i)=>{

const selected =

document.querySelector(
`input[name="q${i}"]:checked`
);

if(
selected &&
selected.value === q.answer
){

score++;

}

});

// PAYLOAD
const payload = {

name:
document.getElementById("name").value,

mobile:
document.getElementById("mobile").value,

email:
document.getElementById("email").value,

score: score,

correct: score,

wrong:
questions.length - score,

result:
score >= (questions.length * 0.5)
? "PASS"
: "FAIL",

timeTaken:
3600 - timeLeft,

photos: photos

};

// SEND DATA
const res = await fetch(scriptURL,{

method:"POST",

headers:{
"Content-Type":
"text/plain;charset=utf-8"
},

body: JSON.stringify(payload)

});

const result =
await res.json();

console.log(result);

// SUCCESS
if(result.status === "success"){

alert("Exam Submitted Successfully");

location.reload();

}else{

alert(
"Submission Failed : " +
result.message
);

}

}catch(err){

console.log(err);

alert(
"Submit Error : " +
err.message
);

}

}

// ================= BUTTON EVENTS =================
document
.getElementById("startBtn")
.addEventListener(
"click",
startExam
);

document
.getElementById("submitBtn")
.addEventListener(
"click",
submitExam
);

</script>

</body>

</html>

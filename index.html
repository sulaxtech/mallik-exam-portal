<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mallik Engineering Exam Portal</title>

<script defer src="https://cdn.jsdelivr.net/npm/face-api.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0f1a;
color:white;
}

.header{
background:#111827;
text-align:center;
padding:20px;
}

.logo{width:130px;margin-bottom:10px}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:#111827;
padding:20px;
border-radius:12px;
margin-top:20px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:none;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
margin-top:15px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

.question{
background:#1f2937;
padding:15px;
margin-top:10px;
border-radius:10px;
}

.timer{
position:fixed;
top:10px;
right:10px;
background:red;
padding:10px 15px;
border-radius:8px;
font-weight:bold;
z-index:999;
}

.hidden{display:none}

video{
width:240px;
height:180px;
border-radius:10px;
margin-top:10px;
background:black;
object-fit:cover;
}

.rules{
background:#1f2937;
padding:12px;
border-radius:10px;
font-size:14px;
margin-top:10px;
line-height:1.5;
}

</style>

</head>

<body>

<!-- HEADER -->
<div class="header">
<img src="mallik-logo.jpg" class="logo">
<h2>Mallik Engineering (India) Pvt Ltd</h2>
<h4>Online Examination System</h4>
</div>

<div class="timer hidden" id="timer">60:00</div>

<div class="container">

<!-- LOGIN -->
<div class="card" id="loginPage">

<h2>Candidate Login</h2>

<input id="name" placeholder="Name">
<input id="mobile" placeholder="Mobile">
<input id="email" placeholder="Email">

<div class="rules">
<b>Exam Rules:</b><br>
✔ No tab switching<br>
✔ Webcam must be ON<br>
✔ Multiple face detection warning<br>
✔ Looking away detection active<br>
✔ Auto submission on violations<br>
</div>

<label>
<input type="checkbox" id="agree">
I accept all exam rules
</label>

<button onclick="startExam()">Start Exam</button>

</div>

<!-- EXAM -->
<div class="card hidden" id="examPage">

<h2>Online Exam</h2>

<video id="webcam" autoplay muted playsinline></video>

<div id="questions"></div>

<button onclick="submitExam()">Submit Exam</button>

</div>

</div>

<script>

const scriptURL =
"https://script.google.com/macros/s/AKfycbyhY5V4Civ8o4YWNC87naanMNNUPfFbsi-n8SGrwDBULTryUvWj6h9sV3hh7KzmrahpVw/exec";

let questions = [];
let photos = [];
let timeLeft = 3600;
let timer;
let examStarted = false;

let warning = 0;
let paused = false;

// ================= CAMERA FIXED =================
async function startCamera(){

try{

const video = document.getElementById("webcam");

const stream = await navigator.mediaDevices.getUserMedia({
video: true,
audio: false
});

video.srcObject = stream;
await video.play();

}catch(e){
alert("Camera permission required");
console.log(e);
}

}

// ================= START EXAM =================
async function startExam(){

if(!document.getElementById("agree").checked){
alert("Please accept rules");
return;
}

document.getElementById("loginPage").classList.add("hidden");
document.getElementById("examPage").classList.remove("hidden");
document.getElementById("timer").classList.remove("hidden");

startCamera();
startTimer();

try{
const res = await fetch(scriptURL);
questions = await res.json();
loadQuestions();
}catch(e){
alert("Question loading failed");
console.log(e);
}

examStarted = true;
startMonitoring();
startAutoCapture();

}

// ================= QUESTIONS =================
function loadQuestions(){

let html="";

questions.forEach((q,i)=>{

html += `<div class="question">
<h3>${i+1}. ${q.q}</h3>`;

q.options.forEach((o,j)=>{
const l=["A","B","C","D"][j];
html += `<label><input type="radio" name="q${i}" value="${l}"> ${l}) ${o}</label><br>`;
});

html += `</div>`;
});

document.getElementById("questions").innerHTML = html;
}

// ================= TIMER =================
function startTimer(){

timer = setInterval(()=>{

if(paused) return;

let m=Math.floor(timeLeft/60);
let s=timeLeft%60;

document.getElementById("timer").innerText =
`${m}:${s}`;

timeLeft--;

if(timeLeft<=0) submitExam();

},1000);

}

// ================= PHOTO =================
function capture(){

const v=document.getElementById("webcam");
const c=document.createElement("canvas");
c.width=320;c.height=240;
c.getContext("2d").drawImage(v,0,0);
photos.push(c.toDataURL("image/png"));

}

// ================= AI MONITOR =================
function startMonitoring(){

setInterval(async()=>{

if(!examStarted || paused) return;

const v=document.getElementById("webcam");

const d=await faceapi.detectAllFaces(
v,
new faceapi.TinyFaceDetectorOptions()
);

// NO FACE
if(d.length===0){
warn("No face detected");
}

// MULTIPLE FACE
if(d.length>1){
warn("Multiple faces detected");
}

// GAZE CHECK (basic)
if(d.length===1 && d[0].box.width < 120){
warn("Looking away detected");
}

},4000);

}

// ================= WARNING SYSTEM =================
function warn(msg){

warning++;
capture();
alert(msg);

if(warning>=3){
pauseExam("Too many violations");
}

}

// ================= PAUSE =================
function pauseExam(msg){
paused=true;
clearInterval(timer);
alert(msg);
}

// ================= AUTO CAPTURE =================
function startAutoCapture(){

setInterval(()=>{
if(!paused) capture();
},30000);

}

// ================= TAB SWITCH =================
document.addEventListener("visibilitychange",()=>{

if(document.hidden && examStarted){
warn("Tab switch detected");
}

});

// ================= SUBMIT FIXED =================
async function submitExam(){

try{

clearInterval(timer);
capture();

let score=0;

questions.forEach((q,i)=>{
let s=document.querySelector(`input[name="q${i}"]:checked`);
if(s && s.value===q.answer) score++;
});

let payload={
name:name.value,
mobile:mobile.value,
email:email.value,
score,
correct:score,
wrong:questions.length-score,
result:score>=50?"PASS":"FAIL",
timeTaken:3600-timeLeft,
photos
};

const res=await fetch(scriptURL,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(payload)
});

await res.text();

alert("Exam Submitted Successfully");

}catch(e){

alert("Submit failed");
console.log(e);

}

}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mallik Exam Portal</title>

<style>
body{margin:0;font-family:Arial;background:#0b0f1a;color:#fff}
.container{max-width:900px;margin:auto;padding:20px}
.card{background:#111827;padding:20px;border-radius:12px;margin-top:20px}
input,button{width:100%;padding:12px;margin-top:10px;border-radius:8px;border:none}
button{background:#2563eb;color:#fff;cursor:pointer}
.question{background:#1f2937;padding:15px;margin-top:10px;border-radius:10px}
.timer{position:fixed;top:10px;right:10px;background:red;padding:10px;border-radius:8px;font-weight:bold}
.hidden{display:none}
video{width:220px;border-radius:10px;margin-top:10px;background:#000}
</style>

</head>

<body>

<div class="timer hidden" id="timer">60:00</div>

<div class="container">

<div class="card" id="loginPage">
<h2>Login</h2>
<input id="name" placeholder="Name">
<input id="mobile" placeholder="Mobile">
<input id="email" placeholder="Email">
<button onclick="startExam()">Start Exam</button>
</div>

<div class="card hidden" id="examPage">
<h2>Exam</h2>

<video id="webcam" autoplay muted playsinline></video>

<div id="questions"></div>

<button onclick="submitExam()">Submit</button>
</div>

</div>

<script>

const scriptURL =
"https://script.google.com/macros/s/AKfycbyhY5V4Civ8o4YWNC87naanMNNUPfFbsi-n8SGrwDBULTryUvWj6h9sV3hh7KzmrahpVw/exec";

let questions = [];
let photos = [];
let timeLeft = 3600;
let timer;
let examStarted = false;

// START EXAM
async function startExam(){

document.getElementById("loginPage").classList.add("hidden");
document.getElementById("examPage").classList.remove("hidden");
document.getElementById("timer").classList.remove("hidden");

startCamera();
startTimer();

const res = await fetch(scriptURL);
questions = await res.json();

loadQuestions();

examStarted = true;
}

// CAMERA
async function startCamera(){
const stream = await navigator.mediaDevices.getUserMedia({video:true});
document.getElementById("webcam").srcObject = stream;
}

// QUESTIONS
function loadQuestions(){
let html = "";

questions.forEach((q,i)=>{
html += `<div class="question">
<h3>${i+1}. ${q.q}</h3>`;

q.options.forEach((opt,j)=>{
const letter = ["A","B","C","D"][j];
html += `<label><input type="radio" name="q${i}" value="${letter}"> ${letter}) ${opt}</label><br>`;
});

html += `</div>`;
});

document.getElementById("questions").innerHTML = html;
}

// TIMER
function startTimer(){
timer = setInterval(()=>{
let m = Math.floor(timeLeft/60);
let s = timeLeft%60;
document.getElementById("timer").innerText =
`${m}:${s}`;
timeLeft--;
if(timeLeft<=0) submitExam();
},1000);
}

// PHOTO CAPTURE
function capture(){
const v = document.getElementById("webcam");
const c = document.createElement("canvas");
c.width=320;c.height=240;
c.getContext("2d").drawImage(v,0,0);
photos.push(c.toDataURL("image/png"));
}

// SUBMIT
async function submitExam(){

clearInterval(timer);
capture();

let score = 0;

questions.forEach((q,i)=>{
let sel = document.querySelector(`input[name="q${i}"]:checked`);
if(sel && sel.value === q.answer) score++;
});

let data = {
name:document.getElementById("name").value,
mobile:document.getElementById("mobile").value,
email:document.getElementById("email").value,
score:score,
correct:score,
wrong:questions.length-score,
result: score >= 50 ? "PASS" : "FAIL",
timeTaken:3600-timeLeft,
photos:photos
};

await fetch(scriptURL,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(data)
});

alert("Submitted Successfully");
}

</script>

</body>
</html>
